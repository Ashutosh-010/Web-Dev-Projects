<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" role="img" aria-label="Expat Explore">
  <defs>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E31837"/>
      <stop offset="100%" stop-color="#B81024"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#FFCB47"/>
    </linearGradient>
    <filter id="sh" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>
  <g filter="url(#sh)">
    <!-- Arrow body -->
    <path fill="url(#arrowGrad)" d="M2 10c0-4 3-8 8-9l108-1c6 0 10 4 10 10v22c0 6-4 10-10 10H10c-5 0-8-4-8-8V10z"/>
    <!-- Gold stripe -->
    <path fill="url(#goldGrad)" d="M10 16h88c4 0 6 3 6 6v2c0 4-2 6-6 6H10v-14z"/>
    <!-- Arrow tip -->
    <path fill="#fff" d="M158 14h8v24h-8l22-12-22-12z" opacity="0.95"/>
  </g>
  <text x="20" y="23" fill="#fff" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="15.5" letter-spacing="-0.3">expat</text>
  <text x="20" y="38" fill="#fff" font-family="Montserrat, Arial, sans-serif" font-weight="500" font-size="10.5" letter-spacing="1.2" opacity="0.92">explore</text>
  <!-- Globe -->
  <g transform="translate(178, 26)">
    <circle r="11" fill="none" stroke="#F5A623" stroke-width="1.8"/>
    <ellipse rx="11" ry="4.5" fill="none" stroke="#fff" stroke-width="1" opacity="0.55"/>
    <path d="M-11 0h22M0-11v22" stroke="#fff" stroke-width="0.9" opacity="0.45"/>
  </g>
</svg>
